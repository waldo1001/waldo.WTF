# waldo.WTF — docker compose
#
# Bind mounts:
#   ./data/db            -> /data/db             (SQLite lake + WAL/SHM sidecars)
#   ./data/auth          -> /data/auth           (MSAL token cache + delta-state)
#   ./data/whatsapp-inbox   -> /data/whatsapp-inbox   (drop zip/txt exports here)
#   ./data/whatsapp-archive -> /data/whatsapp-archive (imported files archived here)
#
# On the Synology NAS these resolve under /volume1/docker/waldo-wtf/. NEVER put
# the db volume on an SMB / network share — SQLite + WAL over SMB corrupts.
# The whatsapp-inbox/archive folders are pure file throughput and are safe on
# any local filesystem, including ones writable from the Mac over SMB/Taildrop.
#
# First-run MSAL login (attach an interactive terminal):
#   docker compose run --rm waldo --add-account
#
# Long-running server:
#   docker compose up -d
#
# Tail logs:
#   docker compose logs -f

services:
  waldo:
    build:
      context: .
      dockerfile: Dockerfile
      # DS223 = arm64. Set explicitly so cross-arch builds on an M-series Mac
      # don't silently produce an amd64 image.
      platforms:
        - linux/arm64
    image: waldo-wtf:local
    container_name: waldo-wtf
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override loopback default so the published port is reachable from the host.
      WALDO_BIND_HOST: "0.0.0.0"
      WALDO_DB_PATH: "/data/db/lake.db"
      WALDO_AUTH_DIR: "/data/auth"
      WALDO_WHATSAPP_WATCH: "true"
      WALDO_WHATSAPP_DOWNLOADS_PATH: "/data/whatsapp-inbox"
      WALDO_WHATSAPP_ARCHIVE_PATH: "/data/whatsapp-archive"
      WALDO_WHATSAPP_ACCOUNT: "whatsapp-local"
    ports:
      # Host port : container port. Keep 8765 on both sides so Claude Desktop's
      # MCP config can use http://<tailnet-host>:8765 unchanged.
      - "8765:8765"
    volumes:
      - ./data/db:/data/db
      - ./data/auth:/data/auth
      - ./data/whatsapp-inbox:/data/whatsapp-inbox
      - ./data/whatsapp-archive:/data/whatsapp-archive
    labels:
      # Tells the willfarrell/autoheal sidecar (see `autoheal` service below)
      # to watch this container's healthcheck and restart it on 3 consecutive
      # unhealthy verdicts. `restart: unless-stopped` alone does not fire
      # when the event loop is wedged but the process hasn't exited.
      - "autoheal=true"
    healthcheck:
      # /health is unauthenticated and returns {ok:true}. Uses node's built-in
      # http (NOT fetch) so we get an explicit per-request timeout: a wedged
      # event loop can stall fetch() indefinitely, which would burn through
      # autoheal's retry budget and delay the restart we are trying to
      # trigger. Every error path here calls process.exit(1) so the check
      # fails in <3s rather than waiting for the outer 5s docker timeout.
      # /health responds 200 directly; if a future change adds a redirect,
      # this script must be revisited (node:http does not follow them).
      test:
        - "CMD-SHELL"
        - "node --eval \"const c=require('http').request({host:'127.0.0.1',port:8765,path:'/health',timeout:3000},r=>process.exit(r.statusCode===200?0:1));c.on('timeout',()=>process.exit(1));c.on('error',()=>process.exit(1));c.end();\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  autoheal:
    # willfarrell/autoheal watches every container labeled `autoheal=true` on
    # this Docker host and restarts any whose healthcheck reports unhealthy
    # for AUTOHEAL_INTERVAL × default-3-retries. Privileged docker.sock mount
    # is required so the sidecar can issue restart commands; trust decision
    # documented in docs/runbooks/autoheal-smoke.md.
    image: willfarrell/autoheal:latest
    container_name: waldo-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "30"
      AUTOHEAL_START_PERIOD: "60"
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
